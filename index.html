<<!DOCTYPE html>
<html>
<head>
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

    <div class="display" id="display">0</div>

    <div class="buttons">

        <button class="gray">2nd</button>
        <button class="gray">π</button>
        <button class="gray">e</button>
        <button class="gray">mc</button>
        <button class="gray">m+</button>
        <button class="gray">m-</button>

        <button class="gray">sin</button>
        <button class="gray">cos</button>
        <button class="gray">tan</button>
        <button class="gray">ln</button>
        <button class="gray">log</button>
        <button class="gray">√</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="orange">÷</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="orange">×</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="orange">−</button>

        <button>0</button>
        <button>.</button>
        <button>C</button>
        <button class="orange">+</button>

        <button class="zero">=</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
